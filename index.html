<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propulsion Brief</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#03040a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PropBrief" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #03040a;
      --green: #00ff88;
      --purple: #bf80ff;
      --blue: #4da6ff;
      --orange: #ffaa33;
      --red: #ff4444;
      --text: #8892b0;
      --white: #cdd6f4;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    }

    #stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, #0a0f1a 0%, #03040a 70%);
    }

    .wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 32px 18px 60px; }

    .header { text-align: center; margin-bottom: 40px; }
    .header-eyebrow { font-size: 9px; letter-spacing: .3em; color: var(--green); opacity: .6; margin-bottom: 14px; }
    .header-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(22px, 7vw, 36px);
      font-weight: 900;
      line-height: 1.15;
      color: #fff;
      letter-spacing: .06em;
    }
    .header-title span { color: var(--green); }
    .header-date { font-size: 11px; color: #444; letter-spacing: .12em; margin-top: 10px; }

    #start-screen { text-align: center; padding: 20px 0; }
    .start-btn {
      background: transparent;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: .2em;
      padding: 18px 44px;
      cursor: pointer; border-radius: 2px;
      transition: all .2s;
    }
    .start-btn:active { background: #00ff8822; transform: scale(.97); }
    .start-hint { margin-top: 16px; color: #2a3a2a; font-size: 10px; letter-spacing: .1em; }

    #loading-screen { display: none; text-align: center; padding: 40px 0; }
    .loading-title {
      font-family: 'Orbitron', sans-serif; font-size: 12px;
      letter-spacing: .2em; color: var(--green); margin-bottom: 32px;
      animation: glow 1.5s ease-in-out infinite;
    }
    .progress-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .progress-dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #333; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .3s;
    }
    .progress-dot.done { border-color: var(--green); background: var(--green); }
    .progress-dot.active { border-color: var(--green); animation: pulse 1s infinite; }
    .progress-dot.done::after { content: '✓'; font-size: 11px; color: #000; font-weight: 700; }
    .progress-label { font-size: 12px; color: #333; letter-spacing: .08em; transition: color .3s; }
    .progress-label.active { color: var(--green); }

    #briefing-screen { display: none; }

    .headline-card {
      border: 1px solid #1a2a1a;
      background: linear-gradient(135deg, #0a140a, #03040a);
      padding: 22px; margin-bottom: 22px; border-radius: 4px; position: relative;
    }
    .headline-card::before {
      content: ''; position: absolute; top: -1px; left: 20px; right: 20px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }
    .section-eyebrow { font-size: 9px; letter-spacing: .3em; margin-bottom: 10px; opacity: .7; }
    .headline-text {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(13px, 3.5vw, 17px);
      color: #fff; font-weight: 700; line-height: 1.45; letter-spacing: .02em;
    }

    .item { border-radius: 4px; padding: 14px 16px; margin-bottom: 12px; transition: transform .15s; }
    .item:active { transform: scale(.99); }
    .item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .item-badge {
      font-size: 8px; letter-spacing: .2em; font-weight: 600;
      border-radius: 2px; padding: 2px 7px; border: 1px solid;
    }
    .item-title { font-size: 12px; font-weight: 600; color: #fff; letter-spacing: .02em; flex: 1; min-width: 0; }
    .item-summary { font-size: 11px; color: var(--text); line-height: 1.7; margin-bottom: 8px; }
    .item-sig { font-size: 10px; line-height: 1.5; border-top: 1px solid; padding-top: 8px; opacity: .8; }

    .cat-LAUNCH     { background: #0a2a1a; border-left: 3px solid var(--green);  }
    .cat-PROPULSION { background: #1a0a2a; border-left: 3px solid var(--purple); }
    .cat-MISSION    { background: #0a1a2a; border-left: 3px solid var(--blue);   }
    .cat-STARTUP    { background: #2a1a0a; border-left: 3px solid var(--orange); }
    .cat-ANOMALY    { background: #2a0a0a; border-left: 3px solid var(--red);    }
    .cat-POLICY     { background: #1a1a0a; border-left: 3px solid #cccc44;       }

    .spotlight-card {
      border: 1px solid #bf80ff44; background: linear-gradient(135deg, #1a0a2a, #0d0516);
      padding: 22px; margin-bottom: 22px; border-radius: 4px; position: relative;
    }
    .spotlight-card::before {
      content: ''; position: absolute; top: -1px; left: 20px; right: 20px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
    }
    .spotlight-text { color: #c9b3e8; font-size: 12px; line-height: 1.85; font-style: italic; }

    .quote-card {
      border: 1px solid #1a1a2a; background: var(--bg);
      padding: 18px 22px; margin-bottom: 28px; border-radius: 4px; text-align: center;
    }
    .quote-text { color: #566; font-size: 11px; line-height: 1.75; font-style: italic; }

    .reload-btn {
      display: block; width: 100%; background: transparent;
      border: 1px solid #1e2433; color: #445;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      letter-spacing: .12em; padding: 12px;
      cursor: pointer; border-radius: 4px;
    }
    .reload-btn:active { border-color: var(--green); color: var(--green); }

    #error-screen {
      display: none; border: 1px solid var(--red); background: #2a0a0a;
      padding: 20px; border-radius: 4px; color: #ff8888; font-size: 12px;
      margin-bottom: 20px; line-height: 1.6;
    }
    .retry-btn {
      margin-top: 14px; background: transparent; border: 1px solid var(--red);
      color: var(--red); font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      letter-spacing: .1em; padding: 8px 20px; cursor: pointer; border-radius: 4px;
    }

    .footer { margin-top: 48px; text-align: center; font-size: 9px; color: #141820; letter-spacing: .2em; }

    @keyframes glow { 0%,100%{text-shadow:0 0 8px #00ff8888}50%{text-shadow:0 0 20px #00ff88cc} }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #00ff8844}50%{box-shadow:0 0 0 4px #00ff8822} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
    @keyframes twinkle { from{opacity:.05}to{opacity:.9} }
    .fade-in { animation: fadeUp .5s ease; }
  </style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">
  <div class="header">
    <div class="header-eyebrow">MISSION CONTROL · INTELLIGENCE FEED</div>
    <div class="header-title">PROPULSION<br><span>MORNING BRIEF</span></div>
    <div class="header-date" id="dateDisplay"></div>
  </div>

  <div id="start-screen">
    <button class="start-btn" id="startBtn">▶ BRIEFING STARTEN</button>
    <div class="start-hint">Sucht live im Web nach den neuesten Space &amp; Propulsion News</div>
  </div>

  <div id="loading-screen">
    <div class="loading-title">INTELLIGENCE GATHERING...</div>
    <div style="max-width:300px;margin:0 auto;text-align:left">
      <div class="progress-item"><div class="progress-dot" id="p0"></div><span class="progress-label" id="pl0">Initialisierung</span></div>
      <div class="progress-item"><div class="progress-dot" id="p1"></div><span class="progress-label" id="pl1">Web-Suche</span></div>
      <div class="progress-item"><div class="progress-dot" id="p2"></div><span class="progress-label" id="pl2">Analyse</span></div>
      <div class="progress-item"><div class="progress-dot" id="p3"></div><span class="progress-label" id="pl3">Formatierung</span></div>
    </div>
  </div>

  <div id="error-screen">
    <span id="errorMsg"></span>
    <button class="retry-btn" id="retryBtn">↺ NOCHMAL VERSUCHEN</button>
  </div>

  <div id="briefing-screen"></div>

  <div class="footer">POWERED BY CLAUDE + WEB SEARCH · AD ASTRA</div>
</div>

<script>
  const WORKER_URL = 'https://rapid-pine-b864.etienne-klein3.workers.dev';

  const SYSTEM = `You are a concise space and rocket propulsion intelligence analyst delivering a morning briefing to an aerospace engineering student focused on rocket engines.

Search the web for the LATEST news (last 48 hours if possible) covering:
1. Rocket launches and mission updates
2. Rocket engine and propulsion technology developments
3. Space startups and new propulsion concepts
4. Notable failures, anomalies, or breakthroughs

Respond ONLY with a valid JSON object — no markdown, no backticks:
{
  "headline": "one punchy headline",
  "items": [
    {
      "category": "LAUNCH|PROPULSION|MISSION|STARTUP|ANOMALY|POLICY",
      "title": "short title",
      "summary": "2-3 technical sentences. Mention engine names, propellants, thrust figures if relevant.",
      "significance": "one sentence on propulsion engineering relevance"
    }
  ],
  "propulsion_spotlight": "3-4 sentence technical deep-dive on best propulsion story",
  "quote_of_day": "real quote with attribution from a rocket engineer or astronaut"
}
Return 4-7 items. Be factual and current.`;

  const cats = {
    LAUNCH:     { color: '#00ff88' },
    PROPULSION: { color: '#bf80ff' },
    MISSION:    { color: '#4da6ff' },
    STARTUP:    { color: '#ffaa33' },
    ANOMALY:    { color: '#ff4444' },
    POLICY:     { color: '#cccc44' },
  };

  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    const size = Math.random() * 1.6 + 0.3;
    Object.assign(s.style, {
      position: 'absolute',
      left: Math.random() * 100 + '%',
      top: Math.random() * 100 + '%',
      width: size + 'px', height: size + 'px',
      borderRadius: '50%', background: '#fff',
      opacity: Math.random() * 0.6 + 0.1,
      animation: `twinkle ${2 + Math.random() * 4}s ease-in-out ${Math.random() * 4}s infinite alternate`,
    });
    starsEl.appendChild(s);
  }

  // Date
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' }) + ' · ' +
    now.toLocaleDateString('de-CH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // Progress
  function setStage(n) {
    for (let i = 0; i < 4; i++) {
      document.getElementById('p' + i).className  = 'progress-dot'   + (i < n ? ' done' : i === n ? ' active' : '');
      document.getElementById('pl' + i).className = 'progress-label' + (i <= n ? ' active' : '');
    }
  }

  // Screens
  const screenIds = ['start-screen', 'loading-screen', 'error-screen', 'briefing-screen'];
  function show(id) {
    screenIds.forEach(s => document.getElementById(s).style.display = s === id ? 'block' : 'none');
  }
  show('start-screen');

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
  function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  async function fetchBriefing() {
    show('loading-screen');
    setStage(0);
    try {
      await delay(400); setStage(1);

      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          system: SYSTEM,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{
            role: 'user',
            content: `Today is ${now.toLocaleDateString('de-CH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}. Generate my morning space and propulsion engineering briefing.`
          }]
        })
      });

      setStage(2);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'API Fehler ' + res.status);

      setStage(3);
      await delay(300);

      const textBlock = data.content?.find(b => b.type === 'text');
      if (!textBlock) throw new Error('Keine Textantwort erhalten.');

      let raw = textBlock.text.trim().replace(/^```json\s*/i, '').replace(/```$/, '').trim();
      renderBriefing(JSON.parse(raw));

    } catch (e) {
      document.getElementById('errorMsg').textContent = '⚠ ' + e.message;
      show('error-screen');
    }
  }

  function renderBriefing(b) {
    const el = document.getElementById('briefing-screen');
    el.innerHTML = '';
    el.className = 'fade-in';

    el.innerHTML += `
      <div class="headline-card">
        <div class="section-eyebrow" style="color:var(--green)">HEUTIGER ÜBERBLICK</div>
        <div class="headline-text">${esc(b.headline)}</div>
      </div>`;

    b.items?.forEach(item => {
      const c = cats[item.category] || cats.MISSION;
      el.innerHTML += `
        <div class="item cat-${item.category}">
          <div class="item-header">
            <span class="item-badge" style="color:${c.color};border-color:${c.color}44">${item.category}</span>
            <span class="item-title">${esc(item.title)}</span>
          </div>
          <div class="item-summary">${esc(item.summary)}</div>
          <div class="item-sig" style="color:${c.color};border-color:${c.color}22">↳ ${esc(item.significance)}</div>
        </div>`;
    });

    if (b.propulsion_spotlight) el.innerHTML += `
      <div class="spotlight-card" style="margin-top:8px">
        <div class="section-eyebrow" style="color:var(--purple)">⚡ PROPULSION SPOTLIGHT</div>
        <div class="spotlight-text">${esc(b.propulsion_spotlight)}</div>
      </div>`;

    if (b.quote_of_day) el.innerHTML += `
      <div class="quote-card">
        <div class="section-eyebrow" style="color:#334">QUOTE OF THE DAY</div>
        <div class="quote-text">"${esc(b.quote_of_day)}"</div>
      </div>`;

    el.innerHTML += `<button class="reload-btn" onclick="fetchBriefing()">↺ NEU LADEN</button>`;
    show('briefing-screen');
  }

  document.getElementById('startBtn').onclick = fetchBriefing;
  document.getElementById('retryBtn').onclick = fetchBriefing;

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
